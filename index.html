<!DOCTYPE html>
<html>

<head>
    <title>Economia PRO</title>
</head>

<body>

    <h1>📈 Economia PRO</h1>

    <p>Bem-vindo ao meu site de Economia.</p>

    <h2>Calculadora de Média</h2>

    <input id="n1" type="number" placeholder="Nota 1">
    <input id="n2" type="number" placeholder="Nota 2">
    <input id="n3" type="number" placeholder="Nota 3">

    <button onclick="calcularMedia()">
        Calcular
    </button>

    <p id="resultado"></p>

    <script>
        function calcularMedia() {

            let n1 = Number(document.getElementById("n1").value);
            let n2 = Number(document.getElementById("n2").value);
            let n3 = Number(document.getElementById("n3").value);

            let media = (n1 + n2 + n3) / 3;

            document.getElementById("resultado").innerHTML =
                "Média = " + media.toFixed(2);
        }
    </script>

</body>

</html>
